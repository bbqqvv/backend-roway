name: Java CI/CD Enterprise Pipeline

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

env:
  # Các biến môi trường dùng chung cho toàn bộ Pipeline
  DB_URL: jdbc:postgresql://localhost:5432/roway_db
  DB_USERNAME: postgres
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  MAIL_HOST: ${{ secrets.MAIL_HOST }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
  VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
  VNPAY_SECRET_KEY: ${{ secrets.VNPAY_SECRET_KEY }}
  VNPAY_RETURN_URL: ${{ secrets.VNPAY_RETURN_URL }}
  VNPAY_URL: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw

      - name: Build with Maven (Skip Tests for Packaging)
        run: ./mvnw clean package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  unit-test:
    name: Core Unit Testing
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roway_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run 8 Enterprise Unit Tests
        run: ./mvnw test

  docker:
    name: Containerize & DockerHub
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/roway-backend
          COMMIT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:$COMMIT_SHA .
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$COMMIT_SHA
