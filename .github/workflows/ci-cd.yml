name: Java CI/CD with API Testing

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

env:
  # Shared env vars for build and run
  DB_URL: jdbc:postgresql://localhost:5432/roway_db
  DB_USERNAME: postgres
  DB_PASSWORD: password
  REDIS_HOST: localhost
  REDIS_PORT: 6379
  JWT_SECRET_KEY: dGhpcy1pcy1hLTMyLWJ5dGUtc2VjcmV0LWtleS0xMjM=
  MAIL_USERNAME: test@example.com
  MAIL_PASSWORD: test
  CLOUDINARY_CLOUD_NAME: test
  CLOUDINARY_API_KEY: test
  CLOUDINARY_API_SECRET: test

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roway_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Set up Node.js (for Newman)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Newman & Reporter
      run: |
        npm install -g newman newman-reporter-htmlextra

    - name: Create Test Assets
      run: |
        mkdir -p test-assets
        echo "fake image content" > test-assets/product.png

    - name: Build with Maven
      run: ./mvnw clean install -DskipTests

    - name: Start Spring Boot App
      run: |
        nohup ./mvnw spring-boot:run > app.log 2>&1 &
        echo "Waiting for app to start..."
        # Wait for port 8080 to be active
        timeout 90s bash -c 'until curl -s localhost:8080/api-docs > /dev/null; do sleep 5; echo "..."; done' || (cat app.log && exit 1)

    - name: Run API Tests (Newman)
      run: |
        newman run "Backend ROWAY.postman_collection.json" \
          --env-var "baseURL=http://localhost:8080" \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export newman-report.html

    - name: Upload Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-report
        path: newman-report.html

    - name: Build Docker Image
      run: docker build -t roway-backend:latest .

    - name: Stop App
      if: always()
      run: |
        pkill -f 'java -jar' || true
