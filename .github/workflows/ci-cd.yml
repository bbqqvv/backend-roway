name: Lean Development Pipeline (Speed Focused)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test-push:
    name: Build, Test & Dockerize
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roway_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: [5432:5432]
      redis:
        image: redis:7-alpine
        ports: [6379:6379]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Verify (Unit Tests)
        env:
          DB_URL: jdbc:postgresql://localhost:5432/roway_db
          DB_USERNAME: postgres
          DB_PASSWORD: password
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'default_secret_key_for_test_only_123' }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          chmod +x mvnw
          ./mvnw clean verify -DskipITs # Chỉ chạy Unit Test cho nhanh, bỏ qua Integration Test nặng (nếu có)

      - name: Dockerize & Push (Simple)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
