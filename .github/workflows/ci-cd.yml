name: Ultimate Production-Grade CI/CD Pipeline (Staff Level)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# 🚥 4. Concurrency Control: Ngăn chặn deploy chồng chéo
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 🛡️ 1. QUALITY GATE: Build & Verify (Unit Test + Coverage Check)
  quality-gate:
    name: Build & Verify (Quality Gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roway_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Hardcore Security Scan (Snyk)
        uses: snyk/actions/maven@v1.2.1 # Pin version cụ thể
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build & Verify (Enforce Coverage Rule)
        env:
          DB_URL: jdbc:postgresql://localhost:5432/roway_db
          DB_USERNAME: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          chmod +x mvnw
          ./mvnw clean verify jacoco:check -Pproduction

      - name: Save Artifact (SHA based)
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: target/*.jar
          retention-days: 1

  # 🐳 2. CONTAINER & SECURITY: Dockerize and Image Scanning
  container-security:
    name: Dockerize & Security Scan
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifact SHA
        uses: actions/download-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: target/

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Load Image (Cache enabled)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Image Security Scan (Trivy - SHA Based)
        uses: aquasecurity/trivy-action@v0.20.0 # Pin version
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}'
          format: 'table'
          exit-code: 1
          severity: 'CRITICAL,HIGH'

      - name: Atomic Push (LATEST + SHA)
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest

  # 🚀 3. CD: Advanced Blue-Green Deployment with Fast Health-Check & Rollback
  deployment:
    name: Enterprise Deployment (Zero-Downtime Lite)
    needs: container-security
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && secrets.PROD_URL || secrets.STAGING_URL }}
    
    steps:
      - name: Automated Cluster Deployment via SSH
        uses: appleboy/ssh-action@v1.0.3 # Pin version
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.PROD_HOST || secrets.STAGING_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMG_TAG=${{ github.sha }}
            IMG_NAME=${{ secrets.DOCKERHUB_USERNAME }}/roway-backend
            
            echo "Step 1: Pulling Image $IMG_TAG..."
            docker pull $IMG_NAME:$IMG_TAG
            
            echo "Step 2: Starting New Instance (Side-by-side)..."
            # Chạy bản mới với port tạm 8081 để check
            docker run -d --name roway_backend_new \
              --restart always \
              -p 8081:8080 \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              $IMG_NAME:$IMG_TAG
            
            echo "Step 3: Active Health Check (Looping)..."
            UP=0
            for i in {1..15}; do
              if curl -s -f http://localhost:8081/api-docs > /dev/null; then
                echo "Instance is HEALTHY after $i attempts!"
                UP=1
                break
              fi
              echo "Attempt $i: Not ready, waiting 5s..."
              sleep 5
            done
            
            if [ $UP -eq 1 ]; then
              echo "Step 4: Hot-Switch (Minimizing Downtime)..."
              docker stop roway_backend || true
              docker rm roway_backend || true
              docker stop roway_backend_new
              docker rm roway_backend_new
              
              # Khởi hành bản thức với port 8080
              docker run -d --name roway_backend \
                --restart always \
                -p 8080:8080 \
                -e DB_URL=${{ secrets.DB_URL }} \
                -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
                -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
                $IMG_NAME:$IMG_TAG
              
              echo "DEPLOYMENT COMPLETED SUCCESSFULLY!"
            else
              echo "CRITICAL: NEW INSTANCE IS UNHEALTHY! Cleaning up..."
              docker stop roway_backend_new || true
              docker rm roway_backend_new || true
              echo "Rollback initiated: Old container remains active."
              exit 1
            fi
