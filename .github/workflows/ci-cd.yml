name: Java Enterprise CI/CD Pipeline (Production Ready)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Pipeline Cốt lõi: Build, Test và Quality Check
  build-and-test:
    name: Build, Verify & Quality Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roway_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }} # Bắt buộc dùng secret
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Code Quality & Dependency Scan (Snyk)
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }} # Nếu bạn có Snyk token
        continue-on-error: true # Không chặn build nếu scan chưa pass (tùy policy)

      - name: Build & Verify (Includes Unit & Integration Tests)
        env:
          DB_URL: jdbc:postgresql://localhost:5432/roway_db
          DB_USERNAME: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          chmod +x mvnw
          ./mvnw clean verify -Pproduction

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Upload JAR Artifact (Only if tests pass)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # 2. Pipeline Container & Security Scan
  containerize:
    name: Dockerize & Security Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image with Cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Chưa push để scan bảo mật trước
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest, ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true # Load load image vào local để scan

      - name: Docker Image Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest'
          format: 'table'
          exit-code: '1' # Fail build nếu có lỗi HIGH hoặc CRITICAL
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image (If scan pass)
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}

  # 3. CD - Deployment (Placeholder/SSH Example)
  deploy:
    name: Deployment to Staging/Prod
    needs: containerize
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Determine Environment
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "ENV=PROD" >> $GITHUB_ENV
          else
            echo "ENV=STAGING" >> $GITHUB_ENV
          fi

      - name: Simulated SSH Deployment
        run: |
          echo "Deploying to ${{ env.ENV }} server..."
          echo "Pulling latest image: ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest"
          echo "Updating containers..."
          # Lệnh thực tế: ssh user@host "docker compose pull && docker compose up -d"
