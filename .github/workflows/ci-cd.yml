name: Ultimate Enterprise CI/CD Pipeline (Production-Grade)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 🛡️ 1. QUALITY GATE: Build, Verify (Coverage & Unit Test)
  quality-gate:
    name: Build & Verify (Quality Gate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: roway_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        ports: [5432:5432]
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Hardcore Security Scan (Snyk)
        uses: snyk/actions/maven@master
        # Chặn build trên main nếu có lỗi bảo mật
        continue-on-error: ${{ github.ref != 'refs/heads/main' }} 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Build & Verify (Test + Jacoco Coverage Check)
        env:
          DB_URL: jdbc:postgresql://localhost:5432/roway_db
          DB_USERNAME: postgres
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: |
          chmod +x mvnw
          ./mvnw clean verify jacoco:check -Pproduction

      - name: Export Quality Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            target/site/jacoco/
            target/surefire-reports/

      - name: Save Clean Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: target/*.jar
          retention-days: 1

  # 🐳 2. CONTAINER & SECURITY: Dockerize and Scan SHA Image
  container-security:
    name: Dockerize & Security Scan
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: production-jar
          path: target/

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image (GHA Cache enabled)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Hardcore Docker Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}'
          format: 'table'
          # Chặn build nếu có lỗi HIGH/CRITICAL
          exit-code: 1 
          severity: 'CRITICAL,HIGH'

      - name: Atomic Push (LATEST + SHA)
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:latest

  # 🚀 3. CD: Real Dynamic Deployment with Rollback Logic
  deployment:
    name: Professional Deployment
    needs: container-security
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    environment: 
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && secrets.PROD_URL || secrets.STAGING_URL }}
    
    steps:
      - name: Deploy via SSH (Real Deployment)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ github.ref == 'refs/heads/main' && secrets.PROD_HOST || secrets.STAGING_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying ${{ github.sha }} to Server..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
            
            # Zero-Downtime / Rollback Logic (Basic)
            docker stop roway-backend-old || true
            docker rename roway-backend roway-backend-old || true
            
            docker run -d --name roway-backend \
              --restart always \
              -p 8080:8080 \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/roway-backend:${{ github.sha }}
            
            # Health Check
            sleep 30
            if curl -f http://localhost:8080/api-docs; then
              echo "Deployment Success! Cleaning old containers..."
              docker rm -f roway-backend-old || true
            else
              echo "HEALTH CHECK FAILED! Rolling back..."
              docker stop roway-backend || true
              docker rm -f roway-backend || true
              docker rename roway-backend-old roway-backend || true
              docker start roway-backend || true
              exit 1
            fi
