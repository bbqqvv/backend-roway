# Frontend
frontend.url=http://localhost:3000

# Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Mail
spring.mail.host=localhost
spring.mail.port=587
spring.mail.username=test
spring.mail.password=test

# OAuth2
spring.security.oauth2.client.registration.google.client-id=test
spring.security.oauth2.client.registration.google.client-secret=test
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo

# JWT
application.security.jwt.secret-key=dGhpcy1pcy1hLTMyLWJ5dGUtc2VjcmV0LWtleS0xMjM=
application.security.jwt.expiration=86400000

# Cloudinary
application.cloudinary.cloud-name=test
application.cloudinary.api-key=test
application.cloudinary.api-secret=test

# VNPay
payment.vnPay.tmnCode=test
payment.vnPay.secretKey=test

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

