server:
  port: ${PORT:8080}

frontend:
  url: https://roway-web-service.vercel.app/

spring:
  application:
    name: RowayShop

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/roway_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: 587
    username: ${MAIL_USERNAME:your_email@example.com}
    password: ${MAIL_PASSWORD:your_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    servlet:
      content-type: text/html

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:google_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:google_secret}
            scope:
              - email
              - profile
        provider:
          google:
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000
      database: 0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:dGhpcy1pcy1hLTMyLWJ5dGUtc2VjcmV0LWtleS0xMjM=}
      expiration: 86400000 # 1 day in milliseconds
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:name}
    api-key: ${CLOUDINARY_API_KEY:key}
    api-secret: ${CLOUDINARY_API_SECRET:secret}

payment:
  vnPay:
    url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
    tmnCode: ${VNPAY_TMN_CODE:tmn_code}
    secretKey: ${VNPAY_SECRET_KEY:secret_key}
    version: 2.1.0
    returnUrl: http://localhost:8080/api/v1/payment/vn-pay-callback
